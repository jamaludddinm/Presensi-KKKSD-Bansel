<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scan Presensi KKKS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Arial, sans-serif;
    background: #0f1117;
    color: #fff;
    margin: 0;
    padding: 18px;
    text-align: center;
  }
  h2 { margin: 0 0 4px; font-size: 20px; }
  p.sub { color: #8a8f9c; font-size: 13px; margin: 0 0 16px; }
  select {
    width: 100%; max-width: 420px; padding: 12px; border-radius: 10px;
    border: 1px solid #2a2e3a; background: #1a1d27; color: #fff;
    font-size: 15px; margin-bottom: 14px;
  }
  #reader {
    max-width: 420px; margin: 0 auto; border-radius: 14px; overflow: hidden;
    border: 1px solid #2a2e3a;
  }
  #result {
    margin-top: 16px; padding: 14px; border-radius: 10px; font-size: 16px;
    font-weight: 600; min-height: 24px; max-width: 420px; margin-left: auto; margin-right: auto;
  }
  .ok { background: #163d24; color: #4ade80; }
  .err { background: #3d1616; color: #f87171; }
  .info { background: #1a1d27; color: #8a8f9c; }
  #footer { margin-top: 14px; font-size: 12px; color: #5a5f6e; }
  #cnt { color: #4ade80; font-weight: 700; }
  .setup {
    max-width: 420px; margin: 0 auto 16px; padding: 12px; background: #1a1d27;
    border-radius: 10px; font-size: 13px; color: #d0d3da; text-align: left; display: none;
  }
</style>
</head>
<body>

<h2>Scan Presensi KKKS</h2>
<p class="sub">Pilih kegiatan, lalu arahkan kamera ke QR peserta</p>

<div class="setup" id="setupBox">
  <b>Belum diatur.</b> Edit file ini, cari baris <code>API_URL = '...'</code>
  di bagian bawah, lalu ganti dengan URL Web App Apps Script Anda.
</div>

<select id="kegiatan"><option value="">-- memuat kegiatan --</option></select>
<div id="reader"></div>
<div id="result" class="info">Menunggu koneksi ke server...</div>
<div id="footer">Total scan sukses: <span id="cnt">0</span></div>

<script>
// ======================================================
// GANTI URL DI BAWAH INI dengan URL Web App Apps Script Anda
// (ambil dari menu "Presensi KKKS -> Lihat URL API" di spreadsheet)
// Contoh: https://script.google.com/macros/s/AKfycb.../exec
// ======================================================
const API_URL = 'https://script.google.com/a/admin.sd.belajar.id/macros/s/AKfycbzBlGWQg8JnbTh0wfWT-OewHl1Lj9xYsFy1HMISN5kvH5f7p8es/exec';

let scanner = null;
let busy = false;
let sukses = 0;

function jsonp(url, cb) {
  const name = 'cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
  window[name] = function (data) {
    cb(data);
    delete window[name];
    script.remove();
  };
  const script = document.createElement('script');
  script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + name;
  script.onerror = function () { cb(null); delete window[name]; script.remove(); };
  document.body.appendChild(script);
}

function setResult(text, cls) {
  const el = document.getElementById('result');
  el.textContent = text;
  el.className = cls;
}

if (API_URL.indexOf('PASTE_URL_WEB_APP_DISINI') !== -1) {
  document.getElementById('setupBox').style.display = 'block';
  setResult('Konfigurasi API_URL belum diisi.', 'err');
} else {
  jsonp(API_URL + '?action=getKegiatan', function (list) {
    const sel = document.getElementById('kegiatan');
    if (!list) {
      setResult('Gagal terhubung ke server. Cek API_URL / koneksi internet.', 'err');
      return;
    }
    sel.innerHTML = list.length
      ? '<option value="">-- pilih kegiatan --</option>'
      : '<option value="">Tidak ada kegiatan aktif</option>';
    list.forEach(function (k) {
      const o = document.createElement('option');
      o.value = k.id;
      o.textContent = k.nama + ' (' + k.tanggal + ')';
      sel.appendChild(o);
    });
    setResult('Pilih kegiatan, lalu arahkan kamera ke QR peserta', 'info');
  });

  document.getElementById('kegiatan').addEventListener('change', function () {
    if (this.value && !scanner) startScanner();
  });
}

function startScanner() {
  scanner = new Html5Qrcode('reader');
  scanner
    .start({ facingMode: 'environment' }, { fps: 10, qrbox: 220 }, onScanSuccess)
    .catch(function (err) {
      setResult('Gagal buka kamera: ' + err, 'err');
    });
}

function onScanSuccess(decodedText) {
  if (busy) return;
  const idKegiatan = document.getElementById('kegiatan').value;
  if (!idKegiatan) return;
  busy = true;
  setResult('Memproses...', 'info');

  const url = API_URL + '?action=scan&idKegiatan=' + encodeURIComponent(idKegiatan) +
    '&idPeserta=' + encodeURIComponent(decodedText);

  jsonp(url, function (r) {
    if (!r) {
      setResult('Gagal menghubungi server.', 'err');
    } else {
      setResult((r.success ? 'OK: ' : 'Gagal: ') + r.message, r.success ? 'ok' : 'err');
      if (r.success) {
        sukses++;
        document.getElementById('cnt').textContent = sukses;
      }
    }
    if (navigator.vibrate) navigator.vibrate(r && r.success ? 150 : [100, 50, 100]);
    setTimeout(function () { busy = false; }, 1800);
  });
}
</script>
</body>
</html>
